`<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Loan AI Assistant</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-0: #09111f;
      --bg-1: #0f1728;
      --bg-2: #121c31;
      --surface: rgba(15, 23, 40, 0.86);
      --surface-strong: #18233a;
      --surface-soft: rgba(24, 35, 58, 0.7);
      --line: rgba(148, 163, 184, 0.16);
      --text: #f8fbff;
      --muted: #9fb0ca;
      --muted-strong: #7f93b2;
      --accent: #7dd3fc;
      --accent-strong: #38bdf8;
      --accent-warm: #fb923c;
      --danger: #ff6b7a;
      --success: #4ade80;
      --shadow: 0 24px 60px rgba(1, 6, 18, 0.45);
    }
    body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 28%),
        radial-gradient(circle at 20% 20%, rgba(251, 146, 60, 0.12), transparent 18%),
        linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 42%, var(--bg-2) 100%);
      color: var(--text);
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px 12px 0;
      flex-shrink: 0;
    }
    .panel-tab {
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 12px;
      background: rgba(24, 35, 58, 0.78);
      color: var(--muted);
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease, color 160ms ease;
    }
    .panel-tab:hover,
    .panel-tab:focus-visible {
      transform: translateY(-1px);
      color: var(--text);
      border-color: rgba(125, 211, 252, 0.28);
    }
    .panel-tab.active {
      color: var(--text);
      background: linear-gradient(135deg, rgba(31, 122, 61, 0.24), rgba(29, 143, 225, 0.22));
      border-color: rgba(125, 211, 252, 0.32);
      box-shadow: 0 10px 24px rgba(1, 6, 18, 0.22);
    }
    .view {
      display: none;
      flex: 1;
      min-height: 0;
      flex-direction: column;
    }
    .view.active {
      display: flex;
    }
    .header {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
      background: linear-gradient(180deg, rgba(9, 17, 31, 0.95), rgba(15, 23, 40, 0.88));
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 30px rgba(1, 6, 18, 0.26);
    }
    .header-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .title-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      background: rgba(159, 176, 202, 0.4);
      border-radius: 50%;
      box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.0);
    }
    .status-dot.active {
      background: var(--success);
      box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.35);
      animation: pulse 1.6s ease-in-out infinite;
    }
    .panel-title {
      font-size: 1.02rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .lead-id-lookup {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 9px 11px;
      border: 1px solid rgba(125, 211, 252, 0.18);
      border-radius: 12px;
      background: rgba(15, 23, 40, 0.62);
      min-width: 0;
    }
    .lead-id-label {
      color: var(--muted-strong);
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .lead-id-form {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }
    .lead-id-input {
      min-width: 0;
      flex: 1;
      border: 1px solid rgba(125, 211, 252, 0.24);
      border-radius: 10px;
      background: rgba(2, 6, 23, 0.5);
      color: var(--text);
      padding: 9px 10px;
      font-size: 0.84rem;
      outline: none;
    }
    .lead-id-input:focus {
      border-color: rgba(56, 189, 248, 0.7);
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.16);
    }
    .lead-id-fetch-btn {
      border: 1px solid rgba(56, 189, 248, 0.36);
      border-radius: 10px;
      background: linear-gradient(135deg, #0369a1, #0ea5e9);
      color: #fff;
      font-weight: 800;
      padding: 0 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .lead-id-fetch-btn:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }
    .lead-detail-status {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 9px 11px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 12px;
      background: rgba(15, 23, 40, 0.48);
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.35;
    }
    .lead-detail-status.success {
      border-color: rgba(74, 222, 128, 0.3);
      color: #bbf7d0;
    }
    .lead-detail-status.error {
      border-color: rgba(248, 113, 113, 0.34);
      color: #fecaca;
    }
    .lead-detail-status.loading {
      border-color: rgba(125, 211, 252, 0.24);
      color: var(--accent);
    }
    .lead-detail-data {
      display: none;
      padding: 10px 11px;
      border: 1px solid rgba(125, 211, 252, 0.16);
      border-radius: 12px;
      background: rgba(15, 23, 40, 0.58);
      color: var(--text);
      font-size: 0.76rem;
      line-height: 1.4;
      max-height: 260px;
      overflow: auto;
    }
    .lead-detail-data.active {
      display: block;
    }
    .lead-detail-summary {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }
    .lead-detail-row {
      display: grid;
      grid-template-columns: 108px minmax(0, 1fr);
      gap: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
    }
    .lead-detail-key {
      color: var(--muted-strong);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .lead-detail-value {
      color: var(--text);
      overflow-wrap: anywhere;
    }
    .lead-detail-json summary {
      cursor: pointer;
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 8px;
    }
    .lead-detail-json pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
      color: #dbeafe;
      font-size: 0.72rem;
    }
    .control-btn {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid transparent;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, border-color 160ms ease;
      background: linear-gradient(135deg, #1f7a3d, #2ea44f);
      color: white;
      box-shadow: 0 10px 24px rgba(31, 122, 61, 0.28);
    }
    .capture-controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-top: 8px;
    }
    .capture-controls .control-btn {
      margin: 0;
    }
    .pause-btn {
      min-width: 112px;
      padding: 11px 12px;
      border: 1px solid rgba(251, 191, 36, 0.32);
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      font-size: 0.86rem;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, opacity 160ms ease;
      background: linear-gradient(135deg, #b45309, #f59e0b);
      color: #fffaf0;
      box-shadow: 0 10px 24px rgba(245, 158, 11, 0.22);
    }
    .pause-btn.paused {
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      border-color: rgba(45, 212, 191, 0.32);
      box-shadow: 0 10px 24px rgba(20, 184, 166, 0.22);
    }
    .pause-btn:disabled {
      cursor: not-allowed;
      opacity: 0.48;
      box-shadow: none;
      transform: none;
    }
    .control-btn.active {
      background: linear-gradient(135deg, #b4233e, #ef4444);
      box-shadow: 0 10px 24px rgba(180, 35, 62, 0.28);
    }
    .control-btn:hover,
    .control-btn:focus-visible,
    .pause-btn:hover:not(:disabled),
    .pause-btn:focus-visible:not(:disabled),
    .summary-btn:hover,
    .summary-btn:focus-visible,
    .clear-btn:hover,
    .clear-btn:focus-visible,
    .modal-close:hover,
    .modal-close:focus-visible,
    .copy-button:hover,
    .copy-button:focus-visible {
      transform: translateY(-1px);
    }
    .control-btn:focus-visible,
    .pause-btn:focus-visible,
    .summary-btn:focus-visible,
    .clear-btn:focus-visible,
    .modal-close:focus-visible,
    .copy-button:focus-visible {
      outline: 2px solid rgba(125, 211, 252, 0.7);
      outline-offset: 2px;
    }
    .summary-btn {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid rgba(125, 211, 252, 0.22);
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, border-color 160ms ease;
      background: linear-gradient(135deg, #0f64b5, #1d8fe1);
      color: white;
      margin-top: 8px;
      box-shadow: 0 10px 24px rgba(29, 143, 225, 0.24);
    }
    .mode-btn {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, border-color 160ms ease;
      background: linear-gradient(135deg, #334155, #475569);
      color: #f8fbff;
      margin-top: 8px;
      box-shadow: 0 10px 24px rgba(30, 41, 59, 0.28);
    }
    .mode-btn:hover {
      background: linear-gradient(135deg, #3b4a5f, #55677d);
    }
    .summary-btn:hover {
      background: linear-gradient(135deg, #0f5aa6, #177ecb);
    }
    #mic-permission-btn {
      background: linear-gradient(135deg, #c2410c, #f97316);
      border-color: rgba(251, 146, 60, 0.28);
      box-shadow: 0 10px 24px rgba(249, 115, 22, 0.22);
    }
    #mic-permission-btn:hover,
    #mic-permission-btn:focus-visible {
      background: linear-gradient(135deg, #9a3412, #ea580c);
    }
    .summary-btn:disabled {
      background: linear-gradient(135deg, #4b5563, #64748b);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    .action-buttons {
      display: flex;
      gap: 8px;
    }
    .action-buttons button {
      flex: 1;
    }
    .secondary-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .secondary-actions .mode-btn,
    .secondary-actions .summary-btn {
      margin-top: 0;
    }
    .clear-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      transition: color 0.2s, background 0.2s, transform 0.2s, border-color 0.2s;
    }
    .clear-btn:hover {
      color: var(--danger);
      background: rgba(255, 107, 122, 0.08);
      border-color: rgba(255, 107, 122, 0.16);
    }
    #transcript-container {
      flex-grow: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    #transcript-container::-webkit-scrollbar {
      width: 10px;
    }
    #transcript-container::-webkit-scrollbar-track {
      background: transparent;
    }
    #transcript-container::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.22);
      border-radius: 999px;
      border: 2px solid rgba(9, 17, 31, 0.85);
    }
    /* Card Styles */
    .utterance-card {
      background: linear-gradient(180deg, rgba(24, 35, 58, 0.92), rgba(19, 29, 49, 0.92));
      border-radius: 12px;
      padding: 10px 11px;
      font-size: 0.95rem;
      line-height: 1.4;
      border: 1px solid rgba(125, 211, 252, 0.14);
      border-left: 3px solid var(--accent);
      box-shadow: var(--shadow);
      word-wrap: break-word;
      animation: cardEnter 240ms ease-out both;
    }
    .speaker-tag {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 4px;
      color: var(--muted);
    }
    .speaker-tag.customer {
      color: #a5f3fc;
    }
    .speaker-tag.agent {
      color: #fdba74;
    }
    .utterance-text {
      line-height: 1.4;
    }
    .utterance-card.finalized {
      border-left-color: rgba(148, 163, 184, 0.5);
    }
    .ai-response-card {
      background: linear-gradient(180deg, rgba(14, 27, 49, 0.96), rgba(20, 34, 58, 0.94));
      border-radius: 14px;
      padding: 11px;
      font-size: 0.95rem;
      line-height: 1.4;
      border: 1px solid rgba(56, 189, 248, 0.16);
      border-left: 3px solid var(--accent-strong);
      margin-left: 8px;
      position: relative;
      box-shadow: var(--shadow);
      animation: cardEnter 260ms ease-out both;
    }
    .ai-response-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .ai-response-title {
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .ai-response-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ai-collapse-button {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #d5e0f0;
      padding: 5px 8px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.72rem;
      line-height: 1;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }
    .ai-collapse-button:hover,
    .ai-collapse-button:focus-visible {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(125, 211, 252, 0.2);
    }
    .ai-response-body {
      display: block;
    }
    .ai-response-card.collapsed .ai-response-body {
      display: none;
    }
    .ai-section-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .ai-section-label.loading {
      color: var(--muted);
      animation: pulse 1.5s infinite;
    }
    .ai-context {
      font-size: 0.86rem;
      color: #bfd0e8;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--line);
      line-height: 1.45;
    }
    .ai-suggestion {
      color: var(--text);
      line-height: 1.5;
    }
    .copy-button {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #d5e0f0;
      padding: 5px 8px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, color 160ms ease, border-color 160ms ease;
    }
    .chat-shell {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 14px;
      gap: 12px;
    }
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 14px 0;
    }
    .chat-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .chat-subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 4px;
    }
    .chat-log {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 2px;
    }
    .chat-log::-webkit-scrollbar {
      width: 10px;
    }
    .chat-log::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.22);
      border-radius: 999px;
      border: 2px solid rgba(9, 17, 31, 0.85);
    }
    .chat-message {
      max-width: 92%;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(125, 211, 252, 0.12);
      background: rgba(24, 35, 58, 0.88);
      box-shadow: var(--shadow);
      animation: cardEnter 220ms ease-out both;
    }
    .chat-message.user {
      margin-left: auto;
      border-top-right-radius: 6px;
      background: linear-gradient(180deg, rgba(45, 95, 170, 0.95), rgba(21, 73, 143, 0.92));
    }
    .chat-message.assistant {
      margin-right: auto;
      border-top-left-radius: 6px;
      background: linear-gradient(180deg, rgba(24, 35, 58, 0.96), rgba(20, 34, 58, 0.92));
    }
    .chat-role {
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .chat-text {
      white-space: pre-wrap;
      line-height: 1.45;
      color: var(--text);
    }
    .chat-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .chat-action-btn {
      border: 1px solid rgba(125, 211, 252, 0.28);
      border-radius: 8px;
      background: rgba(15, 23, 40, 0.72);
      color: var(--text);
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 800;
      padding: 7px 10px;
    }
    .chat-action-btn.primary {
      background: linear-gradient(135deg, #0369a1, #0ea5e9);
      border-color: rgba(125, 211, 252, 0.42);
    }
    .chat-action-btn:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }
    .chat-kv-card {
      margin-top: 10px;
      display: grid;
      gap: 8px;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid rgba(125, 211, 252, 0.14);
      background: rgba(9, 17, 31, 0.38);
    }
    .chat-kv-row {
      display: grid;
      grid-template-columns: minmax(110px, 180px) 1fr;
      gap: 12px;
      align-items: start;
    }
    .chat-kv-key {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      word-break: break-word;
    }
    .chat-kv-value {
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 600;
      word-break: break-word;
      text-align: right;
    }
    .chat-message.loading .chat-text {
      color: var(--muted);
    }
    .chat-input-bar {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(12, 20, 35, 0.86), rgba(9, 17, 31, 0.94));
    }
    .chat-input {
      flex: 1;
      min-height: 54px;
      max-height: 150px;
      resize: vertical;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(15, 23, 40, 0.92);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
      line-height: 1.4;
      outline: none;
    }
    .chat-input:focus {
      border-color: rgba(125, 211, 252, 0.42);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
    }
    .chat-send-btn {
      border: 1px solid transparent;
      border-radius: 12px;
      background: linear-gradient(135deg, #0f64b5, #1d8fe1);
      color: white;
      font-weight: 700;
      padding: 12px 16px;
      cursor: pointer;
      min-width: 92px;
      box-shadow: 0 10px 24px rgba(29, 143, 225, 0.24);
      transition: transform 160ms ease, opacity 160ms ease;
    }
    .chat-send-btn:hover,
    .chat-send-btn:focus-visible {
      transform: translateY(-1px);
    }
    .chat-send-btn:disabled {
      cursor: not-allowed;
      opacity: 0.65;
      transform: none;
      box-shadow: none;
    }
    .chat-empty {
      color: var(--muted);
      text-align: center;
      padding: 24px 12px;
      border: 1px dashed rgba(148, 163, 184, 0.22);
      border-radius: 14px;
      background: rgba(24, 35, 58, 0.42);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(1, 6, 18, 0.72);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(6px);
    }
    .modal-overlay.active {
      display: flex;
      animation: modalFadeIn 180ms ease-out both;
    }
    .modal-content {
      background: linear-gradient(180deg, rgba(20, 32, 54, 0.98), rgba(12, 20, 35, 0.98));
      border-radius: 18px;
      padding: 24px;
      max-width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
      border: 1px solid rgba(125, 211, 252, 0.16);
      box-shadow: var(--shadow);
      animation: modalPop 180ms ease-out both;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .modal-title {
      font-size: 1.2rem;
      font-weight: 700;
    }
    .modal-close {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 6px 10px;
      font-size: 1.5rem;
      line-height: 1;
      border-radius: 10px;
      transition: color 0.2s, background 0.2s, border-color 0.2s, transform 0.2s;
    }
    .modal-close:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.08);
    }
    .summary-section {
      margin-bottom: 20px;
    }
    .summary-section h3 {
      font-size: 1rem;
      color: var(--accent);
      margin-bottom: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }
    .summary-item {
      background: var(--surface-soft);
      padding: 10px;
      border-radius: 10px;
    }
    .summary-card {
      background: rgba(24, 35, 58, 0.86);
      border-radius: 14px;
      padding: 8px 14px;
      border: 1px solid rgba(125, 211, 252, 0.12);
    }
    .summary-row {
      display: grid;
      grid-template-columns: minmax(140px, 220px) 1fr;
      gap: 16px;
      align-items: start;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }
    .summary-row:last-child {
      border-bottom: none;
    }
    .summary-key {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      word-break: break-word;
    }
    .summary-value {
      font-size: 0.95rem;
      color: var(--text);
      font-weight: 500;
      text-align: right;
      word-break: break-word;
    }
    .summary-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }
    .summary-secondary-btn {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid rgba(125, 211, 252, 0.2);
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, border-color 160ms ease;
      background: linear-gradient(135deg, #14284a, #1f5f8f);
      color: white;
      box-shadow: 0 10px 24px rgba(15, 23, 40, 0.26);
    }
    .summary-secondary-btn:hover,
    .summary-secondary-btn:focus-visible {
      background: linear-gradient(135deg, #17305c, #2675aa);
    }
    .summary-actions-note {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.4;
    }
    .summary-item-label {
      font-size: 0.75rem;
      color: var(--muted-strong);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .summary-item-value {
      font-size: 0.95rem;
      color: var(--text);
      font-weight: 500;
    }
    .summary-item-value.empty {
      color: #75849f;
      font-style: italic;
    }
    .insights-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .insights-list li {
      background: rgba(24, 35, 58, 0.86);
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      border-left: 3px solid var(--accent);
      border: 1px solid rgba(125, 211, 252, 0.1);
    }
    .insights-list li strong {
      color: var(--accent);
    }
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.14);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes modalFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes modalPop {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .error-card {
      background: #3a1e1e;
      border: 1px solid #ff6b6b;
      padding: 12px;
      border-radius: 8px;
      color: #ff6b6b;
      font-size: 0.9rem;
      animation: cardEnter 240ms ease-out both;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="panel-tabs">
    <button id="call-tab" class="panel-tab active" type="button">Call</button>
    <button id="chat-tab" class="panel-tab" type="button">Chat</button>
  </div>

  <div id="call-view" class="view active">
    <div class="header">
      <div class="header-title-row">
        <div class="title-group">
          <div id="dot" class="status-dot"></div>
          <span class="panel-title">Home Loan AI Assistant</span>
        </div>
        <button id="clear-btn" class="clear-btn" title="Clear Call Messages">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>
      </div>
      <div id="lead-id-lookup" class="lead-id-lookup" title="Lead detail lookup">
        <div class="lead-id-label">Lead Detail Lookup</div>
        <form id="lead-id-form" class="lead-id-form">
          <input id="lead-id-input" class="lead-id-input" type="text" inputmode="numeric" autocomplete="off" placeholder="Enter lead id" />
          <button id="lead-id-fetch-btn" class="lead-id-fetch-btn" type="submit">Fetch</button>
        </form>
      </div>
      <div id="lead-detail-status" class="lead-detail-status">Enter a lead id and fetch details.</div>
      <div id="lead-detail-data" class="lead-detail-data"></div>
      <div class="capture-controls">
        <button id="toggle-btn" class="control-btn">Start Capture</button>
        <button id="pause-agent-btn" class="pause-btn" disabled>Pause Mic</button>
      </div>
      <div class="secondary-actions">
        <button id="capture-mode-btn" class="mode-btn">Mode: Google Meet</button>
        <button id="mic-permission-btn" class="summary-btn">
          🎤 Mic Permission
        </button>
      </div>
      <button id="summary-btn" class="summary-btn">
        <span id="summary-btn-text">📊 Generate Summary & Insights</span>
      </button>
    </div>
    <div id="transcript-container"></div>
  </div>

  <div id="chat-view" class="view">
    <div class="chat-shell">
      <div class="chat-header">
        <div>
          <div class="chat-title">Chat with AI</div>
          <div class="chat-subtitle">Ask a normal question. The call view keeps running in the background.</div>
        </div>
        <button id="clear-chat-btn" class="clear-btn" title="Clear Chat History">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>
      </div>
      <div id="chat-log" class="chat-log"></div>
      <form id="chat-form" class="chat-input-bar">
        <textarea id="chat-input" class="chat-input" placeholder="Type your question here..."></textarea>
        <button id="chat-send-btn" class="chat-send-btn" type="submit">Send</button>
      </form>
    </div>
  </div>

  <!-- Summary Modal -->
  <div id="summary-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Conversation Summary & Insights</h2>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <div id="modal-body">
        <!-- Content will be injected here -->
      </div>
    </div>
  </div>

  <script src="lead-detail-api.js"></script>
  <script type="module" src="sidepanel.js"></script>
</body>
</html>
