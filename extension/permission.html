<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microphone Permission</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-0: #08101d;
      --bg-1: #0f1728;
      --surface: rgba(18, 28, 48, 0.92);
      --surface-strong: #18253d;
      --text: #f8fbff;
      --muted: #a6b4c9;
      --accent: #38bdf8;
      --accent-strong: #1d8fe1;
      --success: #4ade80;
      --danger: #ff6b7a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 28%),
        linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 100%);
    }
    .panel {
      width: min(100%, 440px);
      background: linear-gradient(180deg, rgba(24, 37, 61, 0.96), rgba(14, 22, 38, 0.96));
      border: 1px solid rgba(125, 211, 252, 0.15);
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(1, 6, 18, 0.45);
      padding: 28px;
      text-align: center;
      animation: enter 220ms ease-out both;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      color: #bdeaff;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .title {
      margin: 0 0 10px;
      font-size: 1.5rem;
      line-height: 1.2;
    }
    .description {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.96rem;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 0.98rem;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--accent-strong), var(--accent));
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(29, 143, 225, 0.28);
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
    }
    button:hover,
    button:focus-visible {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }
    button:focus-visible {
      outline: 2px solid rgba(125, 211, 252, 0.7);
      outline-offset: 3px;
    }
    #status {
      min-height: 1.4em;
      margin: 18px 0 0;
      font-size: 0.95rem;
      color: var(--muted);
    }
    @keyframes enter {
      from { opacity: 0; transform: translateY(10px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="eyebrow">Permission Required</div>
    <h1 class="title">Grant Microphone Access</h1>
    <p class="description">This lets the extension capture audio for live transcription and AI responses. No capture starts until you click the button.</p>
    <button id="grant-btn">Grant Microphone Access</button>
    <p id="status"></p>
  </main>
  <script src="permission.js"></script>
</body>
</html>
